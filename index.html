<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Prompt Engineering Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            background: linear-gradient(135deg, #1e1b4b 0%, #2e1065 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 40px; }
        h1 { 
            font-size: 48px; 
            font-weight: 800; 
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline { font-size: 16px; color: #c4b5fd; font-weight: 500; }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .panel {
            background: rgba(30, 27, 75, 0.8);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
            color: #c4b5fd;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-btn {
            padding: 12px 16px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            color: #c4b5fd;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: left;
            font-size: 14px;
        }

        .category-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.6);
            transform: translateX(4px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            border-color: transparent;
            color: white;
        }

        .tutorial-content {
            display: none;
        }

        .tutorial-content.active {
            display: block;
        }

        .tutorial-title {
            font-size: 24px;
            font-weight: 700;
            color: #c4b5fd;
            margin-bottom: 16px;
        }

        .tutorial-desc {
            color: #a5b4fc;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .prompt-section {
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid #a78bfa;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .prompt-label {
            font-size: 12px;
            font-weight: 700;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .prompt-text {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 6px;
            padding: 12px;
            color: #e0e7ff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .copy-btn {
            padding: 6px 12px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 4px;
            color: #c4b5fd;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: rgba(99, 102, 241, 0.4);
            border-color: rgba(99, 102, 241, 0.8);
        }

        .tips-box {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 6px;
            padding: 12px;
            margin-top: 16px;
        }

        .tips-title {
            font-size: 12px;
            font-weight: 700;
            color: #d8b4fe;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .tip-item {
            font-size: 13px;
            color: #c4b5fd;
            line-height: 1.5;
            margin-bottom: 6px;
        }

        .api-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(167, 139, 250, 0.2);
        }

        .api-label {
            font-size: 12px;
            font-weight: 700;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .api-input-wrapper {
            position: relative;
        }

        #apiKeyInput {
            width: 100%;
            padding: 10px 40px 10px 10px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 10px;
        }

        #apiKeyInput:focus {
            outline: none;
            border-color: rgba(167, 139, 250, 0.8);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .toggle-visibility {
            position: absolute;
            right: 10px;
            top: 10px;
            background: none;
            border: none;
            color: #a78bfa;
            cursor: pointer;
            font-size: 16px;
        }

        .status-message {
            font-size: 12px;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: none;
        }

        .status-message.show { display: block; }
        .status-message.success { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.4); }
        .status-message.error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); }

        .prompt-input-area {
            margin-top: 20px;
        }

        .prompt-input-label {
            font-size: 12px;
            font-weight: 700;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        #userPrompt {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            margin-bottom: 10px;
        }

        #userPrompt:focus {
            outline: none;
            border-color: rgba(167, 139, 250, 0.8);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .send-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(167, 139, 250, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .response-area {
            margin-top: 20px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 6px;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }

        .response-area.active { display: block; }

        .response-title {
            font-size: 12px;
            font-weight: 700;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .response-content {
            color: #e0e7ff;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(167, 139, 250, 0.3);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .api-status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 8px;
        }

        .api-status-indicator.ready {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }

        .api-status-indicator.waiting {
            background: #f59e0b;
        }

        @media (max-width: 1024px) {
            .layout { grid-template-columns: 1fr; }
            h1 { font-size: 32px; }
        }

        @media (max-width: 640px) {
            .panel { padding: 20px; }
            h1 { font-size: 24px; }
            .tutorial-title { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Claude Prompt Studio</h1>
            <p class="tagline">Learn and test prompt engineering techniques</p>
        </header>

        <div class="layout">
            <!-- Left: Tutorials -->
            <div class="panel">
                <div class="panel-title">📚 How to Use Claude</div>
                <div class="category-list" id="categoryList"></div>
            </div>

            <!-- Right: Live Testing -->
            <div class="panel">
                <div class="panel-title">⚡ Test Your Prompts</div>

                <div class="api-section">
                    <label class="api-label">Claude API Key <span class="api-status-indicator waiting" id="apiStatusIndicator"></span></label>
                    <div class="api-input-wrapper">
                        <input type="password" id="apiKeyInput" placeholder="sk-ant-... (stored locally only)">
                        <button class="toggle-visibility" onclick="togglePasswordVisibility()" title="Show/Hide">👁️</button>
                    </div>
                    <div class="status-message" id="apiStatus"></div>
                    <div style="font-size: 11px; color: #a5b4fc; margin-top: 8px;">
                        💡 Get your key at <a href="https://console.anthropic.com" target="_blank" style="color: #c4b5fd; text-decoration: underline;">console.anthropic.com</a>
                    </div>
                </div>

                <div class="prompt-input-area">
                    <label class="prompt-input-label">Your Prompt</label>
                    <textarea id="userPrompt" placeholder="Paste the example prompt and modify it... or write your own!"></textarea>
                    <button class="send-btn" onclick="sendPrompt()" id="sendBtn">Send to Claude</button>
                </div>

                <div class="response-area" id="responseArea">
                    <div class="response-title">Claude's Response</div>
                    <div class="response-content" id="responseContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('claudeApiKey') || null;
        let apiKeyVisible = false;

        const tutorials = {
            'Write a Business Plan': {
                desc: 'Use Claude to draft a structured business plan with market analysis, strategy, and projections.',
                prompt: `Please create a business plan for a [YOUR IDEA]. Include:
1. Executive Summary (2-3 paragraphs)
2. Problem & Opportunity (what problem does it solve?)
3. Solution (your approach)
4. Target Market & Size
5. Revenue Model
6. Go-to-Market Strategy
7. Financial Projections (3-year estimate)
8. Risks & Mitigation

Format as markdown with clear sections.`
            },
            'Debug Code': {
                desc: 'Let Claude analyze code, identify bugs, and suggest fixes with explanations.',
                prompt: `I have a bug in my code. Please analyze it and explain:
1. What the bug is
2. Why it's happening
3. How to fix it
4. How to prevent similar bugs

Here's the code:
\`\`\`
[PASTE YOUR CODE HERE]
\`\`\`

Assume I'm familiar with programming but new to this language/framework.`
            },
            'Analyze Data': {
                desc: 'Use Claude to interpret data patterns, spot trends, and generate insights.',
                prompt: `I have data I need to understand. Please analyze and provide:
1. Key patterns or trends
2. Outliers or anomalies
3. Potential causes or explanations
4. Actionable insights
5. Questions to investigate further

Here's my data:
[PASTE YOUR DATA HERE]

Context: [Describe what this data represents and why it matters]`
            },
            'Create Marketing Copy': {
                desc: 'Generate compelling marketing messages for your product or service.',
                prompt: `Write marketing copy for my product. Key details:
- Product: [WHAT IS IT?]
- Target audience: [WHO SHOULD USE IT?]
- Key benefit: [WHY SHOULD THEY CARE?]
- Unique angle: [WHAT MAKES IT DIFFERENT?]
- Call to action: [WHAT DO YOU WANT THEM TO DO?]

Please create:
1. Headline (attention-grabbing)
2. Subheadline (supporting)
3. Body copy (3-4 compelling paragraphs)
4. Call-to-action button text

Tone: [professional/casual/playful/urgent]`
            },
            'Learn a Topic': {
                desc: 'Ask Claude to teach you something with explanations at your level.',
                prompt: `Explain [TOPIC] to me as if I'm [YOUR BACKGROUND].

I need to understand:
1. What is it fundamentally?
2. How does it work?
3. Why should I care?
4. Common misconceptions
5. How to get started

Use analogies, examples, and clear language. Avoid jargon unless explained.`
            },
            'Write & Edit': {
                desc: 'Use Claude to draft, edit, and improve written content.',
                prompt: `Please review and improve my writing:

[PASTE YOUR TEXT HERE]

Specific feedback I want:
1. Clarity: Is it easy to understand?
2. Tone: Does it match the intended audience?
3. Structure: Is it well-organized?
4. Grammar/style: Any errors or improvements?

Please provide:
- Specific suggestions
- Rewritten version
- Overall assessment`
            },
            'Brainstorm Ideas': {
                desc: 'Generate creative ideas, options, and solutions.',
                prompt: `I need creative ideas for: [DESCRIBE YOUR CHALLENGE]

Context:
- Constraints: [What are your limits?]
- Goals: [What are you trying to achieve?]
- Timeline: [How much time do you have?]
- Budget: [Any budget constraints?]

Please generate:
1. 5-7 distinct ideas
2. For each idea: pros, cons, and how to execute
3. Which idea you'd recommend and why`
            },
            'Answer Questions': {
                desc: 'Get detailed, accurate answers with explanations.',
                prompt: `I have a question about [TOPIC]: [YOUR QUESTION]

Context that might help:
- My background: [Your expertise level]
- What I'll do with this: [How you'll use the answer]
- Level of detail: [Beginner/Intermediate/Expert explanation wanted]

Please provide a clear, thorough answer with:
1. Direct answer to my question
2. Why that's the case (explanation)
3. Examples that illustrate the point
4. Relevant caveats or exceptions`
            }
        };

        function togglePasswordVisibility() {
            const input = document.getElementById('apiKeyInput');
            apiKeyVisible = !apiKeyVisible;
            input.type = apiKeyVisible ? 'text' : 'password';
        }

        function updateApiStatus() {
            const indicator = document.getElementById('apiStatusIndicator');
            if (apiKey) {
                indicator.className = 'api-status-indicator ready';
                indicator.title = 'API key ready';
            } else {
                indicator.className = 'api-status-indicator waiting';
                indicator.title = 'Waiting for API key';
            }
        }

        // Auto-save API key on input change
        document.addEventListener('DOMContentLoaded', () => {
            const apiInput = document.getElementById('apiKeyInput');
            if (apiKey) {
                apiInput.value = apiKey.substring(0, 10) + '...' + apiKey.substring(apiKey.length - 4);
            }
            
            apiInput.addEventListener('change', (e) => {
                const value = e.target.value.trim();
                if (value && value.startsWith('sk-ant-')) {
                    apiKey = value;
                    localStorage.setItem('claudeApiKey', value);
                    showStatus('✓ API key saved!', 'success');
                    updateApiStatus();
                    // Show masked version
                    apiInput.value = value.substring(0, 10) + '...' + value.substring(value.length - 4);
                }
            });

            updateApiStatus();
            initCategories();
        });

        function initCategories() {
            const categoryList = document.getElementById('categoryList');
            let first = true;
            for (const [title, data] of Object.entries(tutorials)) {
                const btn = document.createElement('button');
                btn.className = `category-btn ${first ? 'active' : ''}`;
                btn.textContent = title;
                btn.onclick = () => selectCategory(title, btn);
                categoryList.appendChild(btn);
                first = false;
            }
            selectCategory(Object.keys(tutorials)[0], document.querySelector('.category-btn'));
        }

        function selectCategory(title, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            displayTutorial(title);
        }

        function displayTutorial(title) {
            const data = tutorials[title];
            const panel = document.querySelector('.panel:first-child');
            
            let html = `
                <div class="tutorial-title">${title}</div>
                <div class="tutorial-desc">${data.desc}</div>
                <div class="prompt-section">
                    <div class="prompt-label">📋 Example Prompt</div>
                    <div class="prompt-text">${escapeHtml(data.prompt)}</div>
                    <button class="copy-btn" onclick="copyPrompt(\`${escapeHtml(data.prompt).replace(/`/g, '\\`')}\`)">Copy to Testing Area</button>
                </div>
                <div class="tips-box">
                    <div class="tips-title">💡 Pro Tips</div>
                    <div class="tip-item">✓ Customize the prompt with your specific details</div>
                    <div class="tip-item">✓ Be specific about what you want</div>
                    <div class="tip-item">✓ Provide context and constraints</div>
                    <div class="tip-item">✓ Specify the output format you need</div>
                    <div class="tip-item">✓ Ask follow-up questions to refine</div>
                </div>
            `;
            
            const tutorialContent = panel.querySelector('.tutorial-content') || document.createElement('div');
            tutorialContent.className = 'tutorial-content active';
            tutorialContent.innerHTML = html;
            if (!panel.querySelector('.tutorial-content')) {
                panel.appendChild(tutorialContent);
            }
        }

        function copyPrompt(prompt) {
            document.getElementById('userPrompt').value = prompt;
            document.getElementById('userPrompt').focus();
            showStatus('✓ Prompt copied! Customize and send.', 'success');
        }

        function showStatus(msg, type) {
            const status = document.getElementById('apiStatus');
            status.textContent = msg;
            status.className = `status-message show ${type}`;
            setTimeout(() => status.classList.remove('show'), 3000);
        }

        async function sendPrompt() {
            const prompt = document.getElementById('userPrompt').value.trim();
            if (!prompt) {
                showStatus('⚠️ Please enter a prompt', 'error');
                return;
            }

            const responseArea = document.getElementById('responseArea');
            const responseContent = document.getElementById('responseContent');
            const sendBtn = document.getElementById('sendBtn');

            sendBtn.disabled = true;
            responseArea.classList.add('active');
            responseContent.innerHTML = '<span class="spinner"></span>Sending to Claude...';

            try {
                if (!apiKey) {
                    responseContent.innerHTML = '⚠️ Add your API key to test live responses.\n\nPaste your API key from https://console.anthropic.com and it will auto-save. Then your prompts will send to live Claude!';
                    sendBtn.disabled = false;
                    return;
                }

                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-6',
                        max_tokens: 1500,
                        messages: [{
                            role: 'user',
                            content: prompt
                        }]
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    responseContent.innerHTML = `❌ Error: ${error.error?.message || 'API request failed'}`;
                    sendBtn.disabled = false;
                    return;
                }

                const data = await response.json();
                const reply = data.content[0].text;
                responseContent.innerHTML = reply;
            } catch (error) {
                responseContent.innerHTML = `❌ Error: ${error.message}`;
            }

            sendBtn.disabled = false;
        }

        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Allow Tab in textarea
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('userPrompt').addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = e.target.selectionStart;
                    const end = e.target.selectionEnd;
                    e.target.value = e.target.value.substring(0, start) + '\t' + e.target.value.substring(end);
                    e.target.selectionStart = e.target.selectionEnd = start + 1;
                }
            });
        });
    </script>
</body>
</html>
